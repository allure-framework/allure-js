pre-commit:
  parallel: false
  jobs:
    - name: Lint Code
      glob: "packages/*/{src,test,features}/**/*.{mjs,cjs,js,ts,tsx}"
      run: yarn oxlint --fix {staged_files}
      stage_fixed: true
    - name: Format Code
      glob: "packages/*/{src,test,features}/**/*.{mjs,cjs,js,ts,tsx}"
      run: yarn oxfmt --write {staged_files}
      stage_fixed: true
    - name: Format Package JSON
      glob: "**/package.json"
      run: yarn oxfmt --write {staged_files}
      stage_fixed: true
