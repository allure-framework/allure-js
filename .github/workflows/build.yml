name: Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - "main"
      - "hotfix-*"

permissions:
  contents: read

jobs:
  check-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
      - name: yarn install & check-cache
        run: |
          yarn install --immutable --immutable-cache --check-cache

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
      - name: yarn install
        run: |
          yarn install --immutable --immutable-cache
      # required to have types info for type-aware linting
      - name: yarn compile
        run: |
          yarn compile
      - name: yarn lint
        run: |
          yarn lint
      - name: yarn format:check
        run: |
          yarn format:check
      - name: yarn lint:type
        run: |
          yarn lint:type
      - name: yarn dlx sherif
        run: |
          yarn dlx sherif

  build:
    name: "Build"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "yarn"

      - name: yarn install
        run: |
          yarn install --immutable --immutable-cache

      - name: "Playwright install chromium for playwright"
        run: yarn workspace allure-playwright playwright install chromium --with-deps

      - name: "Playwright install chromium for vitest"
        run: yarn workspace allure-vitest playwright install chromium --with-deps

      - name: yarn build
        run: |
          yarn run build

      - name: yarn test
        run: |
          yarn run test
