name: Build

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "*"
  push:
    branches:
      - "main"
      - "hotfix-*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "yarn"
      - name: yarn install & check-cache
        run: |
          yarn install --immutable --immutable-cache --check-cache

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "yarn"
      - name: yarn install
        run: |
          yarn install --immutable --immutable-cache
      # required to have types info for type-aware linting
      - name: yarn compile
        run: |
          yarn compile
      - name: yarn lint
        run: |
          yarn lint
      - name: yarn format:check
        run: |
          yarn format:check
      - name: yarn lint:type
        run: |
          yarn lint:type
      - name: yarn dlx sherif
        run: |
          yarn dlx sherif

  build-verify:
    name: "Build Verify (${{ matrix.node-version }}, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 26]
        os: [ubuntu-latest, windows-latest]
        exclude:
          - node-version: 20
            os: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "yarn"

      - name: yarn install
        run: |
          yarn install --immutable --immutable-cache

      - name: yarn build:ci
        run: |
          yarn run build:ci

  test-suite:
    name: "Test ${{ matrix.suite.id }} (${{ matrix.node-version }}, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    env:
      ALLURE_MATRIX_ENV: ${{ matrix.os }}-node-${{ matrix.node-version }}
      ALLURE_DUMP_NAME: allure-results-${{ matrix.os }}-node${{ matrix.node-version }}-${{ matrix.suite.id }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 26]
        os: [ubuntu-latest, windows-latest]
        exclude:
          - node-version: 20
            os: windows-latest
        suite:
          - id: cypress-1
            requirePwChromium: false
          - id: cypress-2
            requirePwChromium: false
          - id: cypress-3
            requirePwChromium: false
          - id: cypress-4
            requirePwChromium: false
          - id: playwright-1
            requirePwChromium: true
          - id: playwright-2
            requirePwChromium: true
          - id: vitest
            requirePwChromium: true
          - id: mocha-a
            requirePwChromium: false
          - id: mocha-b
            requirePwChromium: false
          - id: midweight
            requirePwChromium: true
          - id: testcafe
            requirePwChromium: true
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "yarn"

      - name: yarn install
        run: |
          yarn install --immutable --immutable-cache

      - name: Setup Bun
        if: ${{ matrix.suite.id == 'midweight' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Compile suite dependencies
        run: |
          node ./scripts/ci/run-suite.mjs compile ${{ matrix.suite.id }}

      - name: Install Playwright Chromium
        id: pw-chromium
        if: ${{ matrix.suite.requirePwChromium && (matrix.suite.id != 'testcafe' || matrix.os != 'windows-latest') }}
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/pw-browsers
        run: |
          node ./scripts/ci/install-playwright-chromium.mjs ${{ matrix.os == 'ubuntu-latest' && '--with-deps' || '' }}

      - name: Run suite tests
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/pw-browsers
          PW_CHROMIUM_PATH: ${{ steps.pw-chromium.outputs.path }}
        run: |
          yarn allure run --config ./allurerc.mjs --environment="${{ env.ALLURE_MATRIX_ENV }}" --dump="${{ env.ALLURE_DUMP_NAME }}" --rerun 2 -- node ./scripts/ci/run-suite.mjs test ${{ matrix.suite.id }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ALLURE_DUMP_NAME }}
          if-no-files-found: error
          retention-days: 7
          path: ./${{ env.ALLURE_DUMP_NAME }}.zip

  report:
    needs: [test-suite]
    name: Build report
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      pull-requests: write
      checks: write
    env:
      ALLURE_SERVICE_TOKEN: ${{ secrets.ALLURE_SERVICE_TOKEN }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "yarn"

      - name: yarn install
        run: |
          yarn install --immutable --immutable-cache

      - name: Download Allure dumps
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          pattern: allure-results-*
          path: ./
          merge-multiple: true

      - name: Generate Allure report
        id: generate-report
        run: |
          yarn allure generate --config ./allurerc.mjs --dump="allure-results-*.zip" --output=./out/allure-report

      - name: Upload Allure logs
        if: failure() && steps.generate-report.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: allure-report-logs
          if-no-files-found: ignore
          retention-days: 7
          path: /home/runner/.allure/logs/

      - name: Post Allure summary
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        uses: allure-framework/allure-action@v0
        with:
          report-directory: ./out/allure-report
          github-token: ${{ secrets.GITHUB_TOKEN }}
